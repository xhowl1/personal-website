<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Christopher Tulabut — DevOps Engineer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="brut/styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="brut/theme.jsx"></script>
  <script type="text/babel" src="brut/nav.jsx"></script>
  <script type="text/babel" src="brut/hero.jsx"></script>
  <script type="text/babel" src="brut/work.jsx"></script>
  <script type="text/babel" src="brut/homelab.jsx"></script>
  <script type="text/babel" src="brut/sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const THEME_DEFAULTS = {
      accent: 'orange',
      dark: false,
      intensity: 1,
    };

    function OffKeyboardRail() {
      const [lifted, setLifted] = useState(false);
      useEffect(() => {
        const onScroll = () => {
          const remaining = document.documentElement.scrollHeight - (window.scrollY + window.innerHeight);
          setLifted(remaining < 140);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <a href="off-the-keyboard.html" className={`brut-rail ${lifted ? 'is-lifted' : ''}`} aria-label="Personal page: off the keyboard">
          <span className="brut-rail-dot" aria-hidden></span>
          <span>Off the keyboard</span>
          <span className="brut-rail-arrow" aria-hidden>→</span>
        </a>
      );
    }

    function App() {
      const [theme, setTheme] = useState(THEME_DEFAULTS);
      const [cmdOpen, setCmdOpen] = useState(false);

      useScrollReveal();

      useEffect(() => { applyBrutTheme(theme); }, [theme]);

      useEffect(() => {
        const order = ['orange', 'acid', 'electric', 'cherry'];
        const onCycle = () => setTheme(t => ({ ...t, accent: order[(order.indexOf(t.accent) + 1) % order.length] }));
        const onDark = () => setTheme(t => ({ ...t, dark: !t.dark }));
        window.addEventListener('brut:cycleAccent', onCycle);
        window.addEventListener('brut:toggleDark', onDark);
        return () => {
          window.removeEventListener('brut:cycleAccent', onCycle);
          window.removeEventListener('brut:toggleDark', onDark);
        };
      }, []);

      return (
        <React.Fragment>
          <BrutNav open={cmdOpen} setOpen={setCmdOpen} />
          <main>
            <BrutHero />
            <BrutMarquee />
            <BrutNow />
            <BrutWork />
            <BrutHomelab />
            <BrutStack />
            <BrutContact />
          </main>
          <CommandPalette open={cmdOpen} setOpen={setCmdOpen} />
          <OffKeyboardRail />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
